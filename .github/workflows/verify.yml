name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 35
    env:
      PROJECT: TrustCare.xcodeproj
      SCHEME: TrustCare
      CONFIGURATION: Debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Localization check
        run: swift tools/localization_check.swift

      - name: Localization regressions
        run: make localization-regression

      - name: Xcode build
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Check Supabase Secrets
        id: secrets
        shell: bash
        run: |
          echo "has=${{ secrets.SUPABASE_URL != '' && (secrets.SUPABASE_ANON_KEY != '' || secrets.SUPABASE_SERVICE_ROLE_KEY != '') }}" >> "$GITHUB_OUTPUT"

      - name: Ontology audit (PR offline mode)
        if: github.event_name == 'pull_request'
        env:
          ONTOLOGY_AUDIT_OFFLINE: "1"
        run: swift tools/ontology_audit.swift

      - name: Ontology audit (main against Supabase)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.secrets.outputs.has == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: swift tools/ontology_audit.swift

      - name: Ontology audit skipped (missing secrets)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.secrets.outputs.has != 'true'
        shell: bash
        run: |
          echo "Skipping ontology_audit: SUPABASE_URL and key secrets not configured."
          exit 0
